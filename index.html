<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E3/E300 Field Guide — Acesso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e18;color:#e8edf5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111827;border:1px solid #1c3355;border-radius:16px;padding:32px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.logo{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,#0a6fde,#00c6d4);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin:0 auto 16px}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#8a9bb5;margin-bottom:24px}
.status{padding:16px;border-radius:10px;margin-bottom:20px;font-size:14px;line-height:1.6}
.status.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981}
.status.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.status.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#f59e0b}
.status.info{background:rgba(10,111,222,.1);border:1px solid rgba(10,111,222,.3);color:#3b9aff}
.btn{display:inline-block;padding:14px 28px;border-radius:10px;background:linear-gradient(135deg,#0a6fde,#0858b0);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;text-decoration:none;transition:.2s;margin:6px}
.btn:active{transform:scale(.96)}
.btn.sec{background:#1a2332;border:1px solid #1c3355;color:#8a9bb5}
.steps{text-align:left;margin:16px 0;font-size:13px;color:#8a9bb5;line-height:2}
.steps strong{color:#e8edf5}
.hide{display:none}
.spinner{width:24px;height:24px;border:3px solid #1c3355;border-top-color:#0a6fde;border-radius:50%;animation:sp .7s linear infinite;margin:16px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.timer{font-family:'Courier New',monospace;font-size:28px;color:#f59e0b;margin:12px 0}
</style>
</head>
<body>
<div class="card" id="main">
  <div class="logo">E3</div>
  <h1>E3 Plus / E300 Field Guide</h1>
  <div class="sub">Allen-Bradley Overload Relay — App Técnico</div>
  <div id="content">
    <div class="spinner"></div>
    <p style="color:#8a9bb5;font-size:13px;margin-top:8px">Verificando acesso...</p>
  </div>
</div>

<script>
// ═══ TOKEN SYSTEM ═══
// Cada token funciona UMA VEZ. Após ativação, o app é salvo no localStorage
// e o token é marcado como usado.

const TOKENS_DB_KEY = 'e3guide_tokens';
const APP_KEY = 'e3guide_app_installed';
const APP_ACTIVATED_KEY = 'e3guide_activated';

// Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('t');

function init() {
  const content = document.getElementById('content');
  
  // 1. Já está instalado/ativado neste dispositivo?
  if (localStorage.getItem(APP_ACTIVATED_KEY)) {
    showInstalled(content);
    return;
  }
  
  // 2. Tem token na URL?
  if (!token) {
    showNoToken(content);
    return;
  }
  
  // 3. Verificar se o token é válido
  // Tokens são gerados pelo admin (você). Formato: e3-XXXX-XXXX
  // Para funcionar offline, os tokens válidos ficam embutidos aqui.
  // Quando um token é usado, marca no localStorage que já foi ativado.
  
  const validTokens = getValidTokens();
  const usedTokens = JSON.parse(localStorage.getItem('e3guide_used_tokens') || '[]');
  
  if (!validTokens.includes(token)) {
    showInvalidToken(content);
    return;
  }
  
  if (usedTokens.includes(token)) {
    showUsedToken(content);
    return;
  }
  
  // 4. Token válido! Mostrar tela de ativação
  showActivation(content);
}

function getValidTokens() {
  // ═══ TOKENS VÁLIDOS — GERE AQUI OS TOKENS PARA SEUS COLEGAS ═══
  // Cada token funciona UMA VEZ em UM dispositivo
  // Formato sugerido: e3-XXXX-XXXX (fácil de enviar por WhatsApp)
  return [
    'e3-SADA-NPBF',
    'e3-54UR-NVL2',
    'e3-J5ZP-9U9U',
    'e3-RLJY-V7MD',
    'e3-7E5G-4BR9',
    'e3-GLS4-JZHC',
    'e3-MV5A-2SMN',
    'e3-BFWU-Y63S',
    'e3-7SPG-FQ4B',
    'e3-24QU-JFK5',
    'e3-CN7C-KHXW',
    'e3-MW6N-W5RE',
    'e3-YBUL-LSYM',
    'e3-KZE4-XXDN',
    'e3-DHWC-XVQK',
    'e3-DAZZ-MMBR',
    'e3-VG4C-UB9U',
    'e3-B7VP-XGBM',
    'e3-LPE8-TNBL',
    'e3-3CAW-ZUFB'
  ];
}

function showActivation(el) {
  el.innerHTML = `
    <div class="status ok">
      <strong>✅ Token válido!</strong><br>
      Este link é de uso único. Após ativar, o app fica instalado neste dispositivo e o link expira.
    </div>
    <div class="steps">
      <strong>Passo 1:</strong> Toque em "Ativar App" abaixo<br>
      <strong>Passo 2:</strong> O app será carregado<br>
      <strong>Passo 3:</strong> Adicione à tela inicial do celular<br>
      <strong>Passo 4:</strong> Pronto! O link não funciona mais para outros
    </div>
    <button class="btn" onclick="activateApp()">⚡ Ativar App</button>
    <p style="font-size:11px;color:#556a85;margin-top:12px">Token: ${token}<br>Uso único — não compartilhe este link</p>
  `;
}

function showInstalled(el) {
  el.innerHTML = `
    <div class="status info">
      <strong>📱 App já ativado neste dispositivo!</strong><br>
      O E3/E300 Field Guide já está disponível.
    </div>
    <button class="btn" onclick="openApp()">▶ Abrir App</button>
    <div class="steps" style="margin-top:16px">
      <strong>Dica:</strong> Se ainda não adicionou à tela inicial:<br>
      <strong>Chrome:</strong> Menu ⋮ → "Adicionar à tela inicial"<br>
      <strong>Safari:</strong> Compartilhar ↑ → "Tela de Início"
    </div>
  `;
}

function showNoToken(el) {
  el.innerHTML = `
    <div class="status err">
      <strong>🔒 Acesso restrito</strong><br>
      Este app requer um link de ativação válido.<br>
      Solicite ao administrador (Jamis Costa).
    </div>
  `;
}

function showInvalidToken(el) {
  el.innerHTML = `
    <div class="status err">
      <strong>❌ Token inválido</strong><br>
      O código de acesso "${token}" não é reconhecido.<br>
      Verifique o link recebido ou solicite um novo.
    </div>
  `;
}

function showUsedToken(el) {
  el.innerHTML = `
    <div class="status warn">
      <strong>⚠ Link já utilizado</strong><br>
      Este link de ativação já foi usado em outro dispositivo.<br>
      Cada link funciona apenas UMA vez.<br>
      Solicite um novo link ao administrador.
    </div>
  `;
}

function activateApp() {
  // Marcar token como usado
  const used = JSON.parse(localStorage.getItem('e3guide_used_tokens') || '[]');
  used.push(token);
  localStorage.setItem('e3guide_used_tokens', JSON.stringify(used));
  
  // Marcar dispositivo como ativado
  localStorage.setItem(APP_ACTIVATED_KEY, JSON.stringify({
    token: token,
    activatedAt: new Date().toISOString(),
    device: navigator.userAgent.substring(0, 80)
  }));
  
  // Detectar se é iOS ou Android
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);
  
  document.getElementById('content').innerHTML = `
    <div class="status ok">
      <strong>✅ App ativado com sucesso!</strong>
    </div>

    <div style="text-align:left;padding:16px;background:#111827;border:1px solid #1c3355;border-radius:12px;margin:16px 0">
      <p style="font-size:15px;font-weight:700;margin-bottom:12px;text-align:center">📱 Adicione à tela inicial do celular</p>
      
      ${isIOS ? `
      <p style="font-size:13px;color:#3b9aff;font-weight:700;margin-bottom:8px">iPhone / iPad (Safari):</p>
      <div style="font-size:13px;color:#8a9bb5;line-height:2.2">
        <strong style="color:#e8edf5">1.</strong> Toque no botão <strong style="color:#3b9aff">Compartilhar</strong> ↑ (quadrado com seta pra cima)<br>
        <strong style="color:#e8edf5">2.</strong> Role para baixo e toque em <strong style="color:#3b9aff">"Tela de Início"</strong><br>
        <strong style="color:#e8edf5">3.</strong> Toque em <strong style="color:#3b9aff">"Adicionar"</strong><br>
        <strong style="color:#e8edf5">4.</strong> Pronto! O ícone E3 aparece na tela inicial
      </div>
      ` : isAndroid ? `
      <p style="font-size:13px;color:#10b981;font-weight:700;margin-bottom:8px">Android (Chrome):</p>
      <div style="font-size:13px;color:#8a9bb5;line-height:2.2">
        <strong style="color:#e8edf5">1.</strong> Toque nos <strong style="color:#10b981">3 pontinhos</strong> ⋮ (canto superior direito)<br>
        <strong style="color:#e8edf5">2.</strong> Toque em <strong style="color:#10b981">"Adicionar à tela inicial"</strong><br>
        <strong style="color:#e8edf5">3.</strong> Toque em <strong style="color:#10b981">"Adicionar"</strong><br>
        <strong style="color:#e8edf5">4.</strong> Pronto! O ícone E3 aparece na tela inicial
      </div>
      ` : `
      <p style="font-size:13px;color:#f59e0b;font-weight:700;margin-bottom:8px">Instruções:</p>
      <div style="font-size:13px;color:#8a9bb5;line-height:2.2">
        <strong style="color:#e8edf5">Chrome Android:</strong> Menu ⋮ → "Adicionar à tela inicial"<br>
        <strong style="color:#e8edf5">Safari iPhone:</strong> Compartilhar ↑ → "Tela de Início"<br>
        <strong style="color:#e8edf5">Samsung Internet:</strong> Menu → "Adicionar à tela inicial"
      </div>
      `}
    </div>

    <button class="btn" onclick="openApp()" style="width:100%;padding:16px;font-size:16px">▶ Abrir o App Agora</button>
    
    <p style="font-size:11px;color:#556a85;margin-top:16px;text-align:center">
      ⚠ Primeiro adicione à tela inicial, depois abra pelo ícone.<br>
      Assim funciona offline como um app nativo.
    </p>
  `;
}

function openApp() {
  window.location.href = 'app.html';
}

// Inicializar
init();
</script>
</body>
</html>
